name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    container: nvidia/cuda:13.1.1-devel-ubuntu24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake libglfw3-dev libgl1-mesa-dev libvulkan-dev
      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
